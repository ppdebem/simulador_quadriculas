<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Simulador de Quadrículas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%25%22 text-anchor=%22middle%22 y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <arcgis-map basemap="hybrid" center="-47.9151, -15.6094" zoom="14">
      <arcgis-legend slot="bottom-left"></arcgis-legend>
      <arcgis-sketch
        id="sketch"
        creation-mode="single"
        hide-create-tools-point
        hide-create-tools-polyline
        hide-duplicate-button
        hide-selection-tools-lasso-selection
        hide-selection-tools-rectangle-selection
        default-graphics-layer-disabled
        use-legacy-create-tools
      ></arcgis-sketch>
      <arcgis-editor slot="bottom-right"></arcgis-editor>
      <arcgis-layer-list slot="top-right" visibility-appearance="checkbox"></arcgis-layer-list>
    </arcgis-map>

    <div id="controls">
    <h4>Estatísticas</h4>
      <div id="stats">
        <table>
          <tr>
            <td>Vértices do polígono desenhado:</td>
            <td><span id="drawnVertices">0</span></td>
          </tr>
          <tr>
            <td>Vértices do polígono de quadrículas:</td>
            <td><span id="unionVertices">0</span></td>
          </tr>
          <tr>
            <td>Quadrículas intersectadas:</td>
            <td><span id="totalCells">0</span></td>
          </tr>
          <tr>
            <td>Quadrículas sem restrição total:</td>
            <td><span id="allowedCells">0</span></td>
          </tr>
          <tr>
            <td>Área do polígono desenhado:</td>
            <td><span id="drawnArea">0</span></td>
          </tr>
          <tr>
            <td>Área do polígono de quadrículas:</td>
            <td><span id="unionArea">0</span></td>
          </tr>
        </table>
      </div>
      <p style="color: #636363ff;">Obs: as áreas exemplo nesse mapa não necessariamente condizem com a realidade</p>
      <hr style="border: none; height: 1px; background-color: #6363633b;">
      <button id="clearBtn">Limpar tudo</button>
    </div>
  </body>
</html>
